<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物流工具箱 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e9eef3 0%, #dce3ec 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: white;
            border-radius: 2rem;
            padding: 48px 40px 40px;
            width: 400px;
            max-width: 92vw;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .login-box .logo {
            font-size: 56px;
            margin-bottom: 8px;
        }

        .login-box h1 {
            font-size: 24px;
            color: #1f3a5f;
            margin-bottom: 4px;
        }

        .login-box .subtitle {
            color: #7a8eaa;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .login-box .form-group {
            text-align: left;
            margin-bottom: 18px;
        }

        .login-box .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1f3a5f;
            margin-bottom: 5px;
        }

        .login-box .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbdde9;
            border-radius: 60px;
            font-size: 14px;
            background: #f8fafd;
            transition: 0.2s;
            outline: none;
        }

        .login-box .form-group input:focus {
            border-color: #1a5d8c;
            box-shadow: 0 0 0 3px rgba(26, 93, 140, 0.15);
            background: white;
        }

        .login-box .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, #1a5d8c, #0f2b44);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 12px rgba(26, 93, 140, 0.3);
        }

        .login-box .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26, 93, 140, 0.4);
        }

        .login-box .btn-login:active {
            transform: translateY(0);
        }

        .login-box .error-msg {
            color: #b13b3b;
            font-size: 13px;
            margin-top: 12px;
            min-height: 20px;
        }

        @media (max-width: 480px) {
            .login-box {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>

<div class="login-box">
    <div class="logo">📦</div>
    <h1>物流工具箱</h1>
    <p class="subtitle">请登录以访问工具箱</p>

    <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" value="admin" autofocus>
    </div>

    <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="请输入密码" value="123456">
    </div>

    <button class="btn-login" id="loginBtn">登 录</button>
    <div class="error-msg" id="loginError"></div>
</div>

<script>
    // ============================================================
    //  登录逻辑
    // ============================================================
    const loginBtn = document.getElementById('loginBtn');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginError = document.getElementById('loginError');

    // 🔧 重要：修改为您实际首页的文件名
    // 如果首页是 index.html，保持下面不变
    // 如果首页是 home.html，将 'index.html' 改为 'home.html'
    const HOME_PAGE = 'home.html';

    function handleLogin() {
        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();

        if (!username || !password) {
            loginError.textContent = '⚠️ 请输入用户名和密码';
            return;
        }

        // 验证账号密码
        if (username === 'admin' && password === '123456') {
            loginError.textContent = '';
            // 登录成功，跳转到首页
            window.location.href = HOME_PAGE;
        } else {
            loginError.textContent = '❌ 用户名或密码错误，请重试';
        }
    }

    // 回车键触发登录
    loginBtn.addEventListener('click', handleLogin);
    passwordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
    });
    usernameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') passwordInput.focus();
    });
</script>
</body>
</html>
